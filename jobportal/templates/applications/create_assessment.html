{% extends "home.html" %} 
{% load static %} 
{% block content %} 
{% block csslink %}
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
  integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>
{% endblock csslink %}

{% block body %}
<div class="min-h-screen bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-2xl mx-auto bg-white/95 backdrop-blur-md shadow-2xl rounded-3xl overflow-hidden border border-gray-100">
        
        <div class="bg-gradient-to-br from-purple-600 via-indigo-600 to-indigo-700 px-6 py-8 text-white relative">
            <div class="relative z-10">
                <h2 class="text-3xl font-bold tracking-tight flex items-center gap-3">
                    <i class="fas fa-clipboard-list text-purple-200"></i>
                    Create Assessment
                </h2>
                <p class="text-indigo-100 mt-2 opacity-90">Design a new test to evaluate candidate skills.</p>
            </div>
            <div class="absolute right-0 top-0 h-full w-1/3 bg-white/5 skew-x-12 transform origin-right"></div>
            
        </div>

        <form method="POST" class="p-8 lg:p-10 space-y-8">
            {% csrf_token %}

            <div class="space-y-2 !mt-0">
                <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Assessment Title</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-heading"></i>
                    </span>
                    <input type="text" name="title" required
                        placeholder="e.g. Senior Python Developer Skill Test"
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all placeholder-gray-400">
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Description</label>
                <textarea name="description" rows="3" required
                    placeholder="Provide details about the topics covered..."
                    class="w-full px-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all resize-none"></textarea>
            </div>
            <div class="space-y-2 !mt-5">
               <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Select Job</label>
                <select name="candidate" class="block w-full pl-4 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 rounded-xl appearance-none bg-gray-50">
                    {% for app in applications %}
                        <option value="{{ app.id }}">
                            {{ app.job.title }} - {{ app.applicant.username }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="space-y-2">
                <label class="text-sm font-bold text-gray-700 uppercase tracking-wider ml-1">Duration (Minutes)</label>
                <div class="relative group max-w-[200px]">
                    <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400 group-focus-within:text-indigo-500 transition-colors">
                        <i class="fas fa-clock"></i>
                    </span>
                    <input type="number" name="duration" required min="1"
                        placeholder="60"
                        class="w-full pl-11 pr-4 py-3.5 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-indigo-100 focus:border-indigo-500 outline-none transition-all">
                </div>
                <p class="text-xs text-gray-400 mt-1 italic">Suggested: 30-90 minutes</p>
            </div>

            <hr class="border-gray-100">

            <div class="pt-2 flex items-center gap-4 !mt-0">
                <button type="submit" 
                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-xl hover:shadow-indigo-200 transition-all transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2">
                    <i class="fas fa-plus-circle"></i>
                    Create Assessment
                </button>
                <button type="button" onclick="history.back()" 
                    class="px-8 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl transition-all">
                    Cancel
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock body %} 
{% endblock %}
