<div class="minimal resume-template">
  <h2 class="resume_name">{{ resume.full_name }}</h2>
  <p class="resume_email"><b>Email:</b> {{ resume.email }}</p>
  <p class="resume_phone"><b>Phone:</b> {{ resume.phone }}</p>
  
  <hr>
  <div class="summary form-group">
    <h3>Summary:</h3>
    <p>{{ resume.summary }}</p>
  </div>
  
  <div class="skills form-group">
    <h3>Skills:</h3>
    <p>{{ resume.skills }}</p>
  </div>
  
  <div class="experience form-group">
    <h3>Experience:</h3>
    <p>{{ resume.experience }}</p>
  </div>
  
  <div class="education form-group">
    <h3>Education:</h3>
    <p>{{ resume.education }}</p>
  </div>
</div>
